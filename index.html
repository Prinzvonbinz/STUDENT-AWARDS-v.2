<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Abstimmungssystem</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f2f2f2;
    }

    .box {
      background: white;
      padding: 20px;
      width: 350px;
      margin: auto;
      margin-top: 30px;
      border-radius: 10px;
    }

    select, input, button {
      width: 90%;
      padding: 8px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🗳 Abstimmungssystem</h1>

<div class="box">
<form id="voteForm">

  <div id="formContainer"></div>

  <h2>Zugangscode</h2>
  <input type="text" name="code" placeholder="Code eingeben" required>

  <br><br>
  <button type="submit">Absenden</button>

</form>

<p id="status"></p>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* =========================
   KONFIGURATION
========================= */

const kategorien = ["Lustig", "Sportlich"];

const jungenNamen = [
  "Louis","Leo","Jannes","Milan","Jannek",
  "Adrian","Jesko","Lukas","Osama","Friedrich"
];

const maedchenNamen = [
  "Emmy","Pia","Joy","Hannah","Lyan","Fiona",
  "Meva","Marta","Irene","Jana","Jule","Ruby",
  "Melissa","Ina","Emma","Nele"
];

/* =========================
   UI ERSTELLEN
========================= */

const container = document.getElementById("formContainer");

kategorien.forEach(kategorie => {
  const block = document.createElement("div");

  block.innerHTML = `
    <h2>${kategorie}</h2>

    <label>Jungen:</label>
    <select name="${kategorie}_jungen">
      ${jungenNamen.map(n => `<option>${n}</option>`).join("")}
    </select>

    <br>

    <label>Mädchen:</label>
    <select name="${kategorie}_maedchen">
      ${maedchenNamen.map(n => `<option>${n}</option>`).join("")}
    </select>

    <hr>
  `;

  container.appendChild(block);
});

/* =========================
   SUPABASE VERBINDUNG
========================= */

const supabaseUrl = "https://yetoitdarnogitqoujsz.supabase.co";
const supabaseKey = "sb_publishable_X1__Wrr6_F0zZpMVQJCpyg_UD0fIK94";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   FORM ABSENDEN
========================= */

document.getElementById("voteForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const form = new FormData(e.target);
  const code = form.get("code");

  const user_id = localStorage.getItem("user_id") || crypto.randomUUID();
  localStorage.setItem("user_id", user_id);

  const now = new Date();

  // 🔍 12h Sperre prüfen
  const { data: userData } = await supabaseClient
    .from("users")
    .select("*")
    .eq("user_id", user_id)
    .single();

  if (userData) {
    const diff = (now - new Date(userData.last_vote)) / (1000 * 60 * 60);
    if (diff < 12) {
      document.getElementById("status").innerText =
        "⛔ Du kannst erst nach 12h wieder abstimmen!";
      return;
    }
  }

  // 🗳 Votes speichern
  for (let kategorie of kategorien) {
    const jungen = form.get(`${kategorie}_jungen`);
    const maedchen = form.get(`${kategorie}_maedchen`);

    await supabaseClient.from("votes").insert([
      {
        user_id,
        category: kategorie,
        name: jungen,
        code
      },
      {
        user_id,
        category: kategorie,
        name: maedchen,
        code
      }
    ]);
  }

  // 👤 User aktualisieren
  await supabaseClient.from("users").upsert({
    user_id,
    last_vote: now
  });

  document.getElementById("status").innerText =
    "✅ Stimme erfolgreich gespeichert!";
});

</script>

</body>
</html>
