<script>

/* =========================
   KONFIGURATION
========================= */

const kategorien = ["Lustig", "Sportlich"];

const jungenNamen = [
  "Louis","Leo","Jannes","Milan","Jannek",
  "Adrian","Jesko","Lukas","Osama","Friedrich"
];

const maedchenNamen = [
  "Emmy","Pia","Joy","Hannah","Lyan","Fiona",
  "Meva","Marta","Irene","Jana","Jule","Ruby",
  "Melissa","Ina","Emma","Nele"
];

/* =========================
   UI ERSTELLEN
========================= */

const container = document.getElementById("formContainer");

kategorien.forEach(kategorie => {
  const block = document.createElement("div");

  block.innerHTML = `
    <h2>${kategorie}</h2>

    <label>Jungen:</label>
    <select name="${kategorie}_jungen">
      ${jungenNamen.map(n => `<option>${n}</option>`).join("")}
    </select>

    <br>

    <label>Mädchen:</label>
    <select name="${kategorie}_maedchen">
      ${maedchenNamen.map(n => `<option>${n}</option>`).join("")}
    </select>

    <hr>
  `;

  container.appendChild(block);
});

/* =========================
   SUPABASE VERBINDUNG
========================= */

const supabaseUrl = "https://yetoitdarnogitqoujsz.supabase.co";
const supabaseKey = "sb_publishable_X1__Wrr6_F0zZpMVQJCpyg_UD0fIK94";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   FORM ABSENDEN
========================= */

document.getElementById("voteForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const status = document.getElementById("status");
  const button = e.target.querySelector("button");

  // 🚫 Schon abgestimmt?
  if (localStorage.getItem("voted") === "true") {
    status.innerText = "⛔ Du hast bereits abgestimmt!";
    return;
  }

  const form = new FormData(e.target);
  const code = form.get("code");

  const user_id = localStorage.getItem("user_id") || crypto.randomUUID();
  localStorage.setItem("user_id", user_id);

  const now = new Date();

  // 🔍 12h Sperre prüfen
  const { data: userData, error: userError } = await supabaseClient
    .from("users")
    .select("*")
    .eq("user_id", user_id)
    .single();

  if (userError && userError.code !== "PGRST116") {
    console.log(userError);
    status.innerText = "❌ Fehler beim Prüfen!";
    return;
  }

  if (userData) {
    const diff = (now - new Date(userData.last_vote)) / (1000 * 60 * 60);
    if (diff < 12) {
      status.innerText = "⛔ Du kannst erst nach 12h wieder abstimmen!";
      return;
    }
  }

  // 🗳 Votes speichern
  for (let kategorie of kategorien) {
    const jungen = form.get(`${kategorie}_jungen`);
    const maedchen = form.get(`${kategorie}_maedchen`);

    const { error } = await supabaseClient.from("votes").insert([
      {
        user_id,
        category: kategorie,
        name: jungen,
        code
      },
      {
        user_id,
        category: kategorie,
        name: maedchen,
        code
      }
    ]);

    if (error) {
      console.log(error);
      status.innerText = "❌ Fehler beim Speichern!";
      return;
    }
  }

  // 👤 User aktualisieren
  const { error: upsertError } = await supabaseClient.from("users").upsert({
    user_id,
    last_vote: now
  });

  if (upsertError) {
    console.log(upsertError);
    status.innerText = "❌ Fehler beim Speichern!";
    return;
  }

  // ✅ Erfolgreich
  localStorage.setItem("voted", "true");
  button.disabled = true;

  status.innerText = "✅ Stimme erfolgreich gespeichert!";
  e.target.reset();
});

</script>
