<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Abstimmungssystem</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f2f2f2;
    }

    .box {
      background: white;
      padding: 20px;
      width: 350px;
      margin: auto;
      margin-top: 30px;
      border-radius: 10px;
    }

    select, input, button {
      width: 90%;
      padding: 8px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🗳 Abstimmungssystem</h1>

<div class="box">
  <form id="voteForm">
    <div id="formContainer"></div>

    <h2>Zugangscode</h2>
    <input type="text" name="code" placeholder="Code eingeben" required>

    <br><br>
    <button type="submit">Absenden</button>
  </form>

  <p id="status"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script>

/* =========================
   KONFIG
========================= */

const ADMIN_CODE = "69678492930303039";

const kategorien = [
  "Lustigste/r","Immer gut gelaunt","Beste/r Zeichner/in",
  "Größte/r Freestyler/in","Sportlichste/r","Lauteste/r",
  "Aggressivste/r","Sympathischste/r","Red Bull Süchtigste/r",
  "Mental am stabilsten","Beste Style"
];

const jungenNamen = [
  "Louis","Leo","Jannes","Milan","Jannek",
  "Adrian","Jesko","Lukas","Osama","Friedrich"
];

const maedchenNamen = [
  "Emmy","Pia","Joy","Hannah","Lyan","Fiona",
  "Meva","Marta","Irene","Jana","Jule","Ruby",
  "Melissa","Ina","Emma","Nele"
];

/* =========================
   UI
========================= */

const container = document.getElementById("formContainer");

kategorien.forEach(kategorie => {
  const block = document.createElement("div");

  block.innerHTML = `
    <h2>${kategorie}</h2>

    <label>Jungen:</label>
    <select name="${kategorie}_jungen">
      ${jungenNamen.map(n => `<option>${n}</option>`).join("")}
    </select>

    <br>

    <label>Mädchen:</label>
    <select name="${kategorie}_maedchen">
      ${maedchenNamen.map(n => `<option>${n}</option>`).join("")}
    </select>

    <hr>
  `;

  container.appendChild(block);
});

/* =========================
   SUPABASE
========================= */

const supabaseUrl =
  "https://yetoitdarnogitqoujsz.supabase.co/Vote";

const supabaseKey =
  "sb_publishable_X1__Wrr6_F0zZpMVQJCpyg_UD0fIK94";

const supabaseClient =
  supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   SUBMIT
========================= */

document.getElementById("voteForm").addEventListener("submit", async (e) => {

  e.preventDefault();

  const status = document.getElementById("status");
  const button = e.target.querySelector("button");

  const form = new FormData(e.target);
  const code = form.get("code");

  const isAdmin = code === ADMIN_CODE;

  const user_id =
    localStorage.getItem("user_id") ||
    crypto.randomUUID();

  localStorage.setItem("user_id", user_id);

  /* =========================
     NORMAL USER BLOCK
  ========================= */

  if (!isAdmin && localStorage.getItem("voted") === "true") {
    status.innerText = "⛔ Du hast bereits abgestimmt!";
    return;
  }

  /* =========================
     OPTIONAL 12H LOGIK (ENTFERNT)
  ========================= */

  /* =========================
     SPEICHERN
  ========================= */

  const now = new Date();

  for (let kategorie of kategorien) {

    const jungen = form.get(`${kategorie}_jungen`);
    const maedchen = form.get(`${kategorie}_maedchen`);

    const { error } = await supabaseClient
      .from("votes")
      .insert([
        {
          user_id,
          category: kategorie,
          name: jungen,
          code
        },
        {
          user_id,
          category: kategorie,
          name: maedchen,
          code
        }
      ]);

    if (error) {
      console.log(error);
      status.innerText = JSON.stringify(error);
      return;
    }
  }

  /* =========================
     USER STATE
  ========================= */

  if (!isAdmin) {
    localStorage.setItem("voted", "true");
  }

  button.disabled = true;

  status.innerText = isAdmin
    ? "👑 Admin-Stimme gespeichert!"
    : "✅ Stimme erfolgreich gespeichert!";

  e.target.reset();
});

</script>

</body>
</html>
